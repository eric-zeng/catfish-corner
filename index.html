<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catfish Corner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2/dist/chartjs-plugin-datalabels.min.js"></script>
</head>
<body>
  <h1>🐟 bront and friends' catfish corner 🐈</h1>
  <p class="updated-at">last updated <time id="updated-at"></time></p>
  <div id="app"></div>

  <script type="text/babel">
    Chart.register(ChartDataLabels);

    // ── Shared helpers ────────────────────────────────────────────────────────

    function hslColor(val) {
      const t = Math.max(0, Math.min(1, val / 10));
      return `hsl(${Math.round(t * 120)}, 70%, 68%)`;
    }

    function hslBg(val) {
      return { backgroundColor: hslColor(val) };
    }

    function fmtScore(x) {
      if (x === null || x === undefined) return '';
      return x % 1 === 0 ? String(Math.round(x)) : String(x);
    }

    function fmtStat(x) {
      if (x === null || x === undefined || isNaN(x)) return '';
      return Number(x).toFixed(2);
    }

    // ── LeaderboardTable ──────────────────────────────────────────────────────

    function LeaderboardTable({ onSelectDay }) {
      const [data, setData] = React.useState(null);
      const wrapRef = React.useRef(null);

      React.useEffect(() => {
        fetch('leaderboard.json').then(r => r.json()).then(d => {
          setData(d);
          const el = document.getElementById('updated-at');
          el.dateTime = d.updated_at;
          el.textContent = new Date(d.updated_at).toLocaleString(undefined, {
            dateStyle: 'medium', timeStyle: 'short',
          });
        });
      }, []);

      React.useEffect(() => {
        if (data && wrapRef.current) {
          wrapRef.current.scrollLeft = wrapRef.current.scrollWidth;
        }
      }, [data]);

      if (!data) return null;

      const { days, users, scores, user_stats, day_stats } = data;

      return (
        <div className="table-wrap" ref={wrapRef}>
          <table className="results-table">
            <thead>
              <tr>
                <th className="col-user"></th>
                {days.map(d => (
                  <th key={d}>
                    <button className="day-select-btn" onClick={() => onSelectDay(d)}>#{d}</button>
                  </th>
                ))}
                <th className="col-sep">Mean</th>
                <th>Std Dev</th>
              </tr>
            </thead>
            <tbody>
              {users.map(user => (
                <tr key={user}>
                  <th className="col-user">{user}</th>
                  {days.map(d => {
                    const val = scores[user][d];
                    return <td key={d} style={val !== null ? hslBg(val) : {}}>{fmtScore(val)}</td>;
                  })}
                  <td className="col-sep" style={hslBg(user_stats[user].mean)}>
                    {fmtStat(user_stats[user].mean)}
                  </td>
                  <td>{fmtStat(user_stats[user].std)}</td>
                </tr>
              ))}
              <tr className="row-sep">
                <th className="col-user">Daily Mean</th>
                {days.map(d => (
                  <td key={d} style={hslBg(day_stats.mean[d])}>{fmtStat(day_stats.mean[d])}</td>
                ))}
                <td className="col-sep"></td>
                <td></td>
              </tr>
              <tr>
                <th className="col-user">Daily Std Dev</th>
                {days.map(d => (
                  <td key={d}>{fmtStat(day_stats.std[d])}</td>
                ))}
                <td className="col-sep"></td>
                <td></td>
              </tr>
            </tbody>
          </table>
        </div>
      );
    }

    // ── GuessBreakdown ────────────────────────────────────────────────────────

    function hammingDist(a, b) {
      const n = Math.min(a.length, b.length);
      let dist = 0;
      for (let i = 0; i < n; i++) {
        if (a[i] !== b[i]) dist++;
      }
      return dist;
    }

    function bestPull(records, dayAnswers) {
      if (!dayAnswers.length) return null;
      let minCount = Infinity;
      const tied = [];
      for (let i = 0; i < dayAnswers.length; i++) {
        const players = records.filter(r => r.guesses[i] > 0).map(r => r.username);
        if (players.length === 0) continue;
        if (players.length < minCount) {
          minCount = players.length;
          tied.length = 0;
          tied.push({ article_name: dayAnswers[i].article_name, wikipedia_url: dayAnswers[i].wikipedia_url, players });
        } else if (players.length === minCount) {
          tied.push({ article_name: dayAnswers[i].article_name, wikipedia_url: dayAnswers[i].wikipedia_url, players });
        }
      }
      return tied.length > 0 ? tied : null;
    }

    function mostInSync(records) {
      let best = null, bestDist = Infinity;
      for (let i = 0; i < records.length; i++) {
        for (let j = i + 1; j < records.length; j++) {
          const d = hammingDist(records[i].guesses, records[j].guesses);
          if (d < bestDist) {
            bestDist = d;
            best = [records[i].username, records[j].username];
          }
        }
      }
      return best;
    }

    function GuessCell({ g }) {
      if (g === 1 || g === true)  return <td className="guess-hit">🐈</td>;
      if (g === 0.5)               return <td className="guess-half">🥚</td>;
      if (g === 0 || g === false)  return <td className="guess-miss">🐟</td>;
      return <td></td>;
    }

    function GuessBreakdown({ selectedDay }) {
      const [allDays,     setAllDays]     = React.useState([]);
      const [dayMap,      setDayMap]      = React.useState({});
      const [answersMap,  setAnswersMap]  = React.useState({});
      const [idx,         setIdx]         = React.useState(0);
      const [showAnswers, setShowAnswers] = React.useState(false);
      const [dayInput,    setDayInput]    = React.useState('');

      React.useEffect(() => {
        Promise.all([fetch('data.json').then(r => r.json()), fetch('answers.json').then(r => r.json())])
          .then(([data, answers]) => {
            const map = {};
            data.forEach(rec => {
              const guesses = typeof rec.guesses === 'string' ? JSON.parse(rec.guesses) : rec.guesses;
              if (!map[rec.day_number]) map[rec.day_number] = [];
              map[rec.day_number].push({ username: rec.username, score: rec.score, total: rec.total, guesses });
            });
            const days = Object.keys(map).map(Number).sort((a, b) => a - b);
            setDayMap(map);
            setAllDays(days);
            setIdx(days.length - 1);
            setAnswersMap(answers);
          });
      }, []);

      // Navigate to selectedDay when leaderboard header is clicked
      React.useEffect(() => {
        if (selectedDay === null || allDays.length === 0) return;
        const i = allDays.indexOf(selectedDay);
        if (i !== -1) setIdx(i);
      }, [selectedDay, allDays]);

      const day = allDays[idx];

      React.useEffect(() => { if (day !== undefined) setDayInput(String(day)); }, [day]);

      if (allDays.length === 0) return null;

      function commitDayInput() {
        const n = parseInt(dayInput);
        if (isNaN(n)) { setDayInput(String(day)); return; }
        const exact = allDays.indexOf(n);
        if (exact !== -1) { setIdx(exact); return; }
        // Jump to nearest day with results
        let nearest = 0, minDist = Infinity;
        allDays.forEach((d, i) => { const dist = Math.abs(d - n); if (dist < minDist) { minDist = dist; nearest = i; } });
        setIdx(nearest);
      }

      const records    = [...dayMap[day]].sort((a, b) => b.score - a.score);
      const numGuesses = Math.max(...records.map(r => r.guesses.length));
      const syncPair   = mostInSync(records);
      const dayAnswers = answersMap[day] ?? [];

      return (
        <>
          <div id="day-nav">
            <button onClick={() => setIdx(i => i - 1)} disabled={idx === 0}>←</button>
            <span id="day-label">
              #<input
                id="day-input"
                type="number"
                value={dayInput}
                onChange={e => setDayInput(e.target.value)}
                onBlur={commitDayInput}
                onKeyDown={e => { if (e.key === 'Enter') { commitDayInput(); e.target.blur(); } }}
                onFocus={e => e.target.select()}
              />
            </span>
            <button onClick={() => setIdx(i => i + 1)} disabled={idx === allDays.length - 1}>→</button>
            <a href={`https://catfishing.net/game/${day}`} target="_blank" id="day-link">open on catfishing.net</a>
            <label className="show-answers-label">
              <input type="checkbox" checked={showAnswers} onChange={e => setShowAnswers(e.target.checked)} />
              {' '}show answers
            </label>
          </div>
          <div className="table-wrap">
            <table className="guess-table">
              <thead>
                <tr>
                  <th className="col-user"></th>
                  {Array.from({ length: numGuesses }, (_, i) => {
                    const ans = dayAnswers[i];
                    return (
                      <th key={i} className={showAnswers ? 'col-answer' : ''}>
                        {showAnswers && ans
                          ? <a href={ans.wikipedia_url} target="_blank">{ans.article_name}</a>
                          : i + 1}
                      </th>
                    );
                  })}
                  <th className="col-sep">Score</th>
                </tr>
              </thead>
              <tbody>
                {records.map(rec => (
                  <tr key={rec.username}>
                    <th className="col-user">{rec.username}</th>
                    {Array.from({ length: numGuesses }, (_, i) =>
                      i < rec.guesses.length
                        ? <GuessCell key={i} g={rec.guesses[i]} />
                        : <td key={i}></td>
                    )}
                    <td className="col-sep">{rec.score}/{rec.total}</td>
                  </tr>
                ))}
                {(() => {
                  const groupGuesses = Array.from({ length: numGuesses }, (_, i) =>
                    Math.max(...records.map(r => i < r.guesses.length ? r.guesses[i] : 0))
                  );
                  const groupScore = groupGuesses.reduce((s, g) => s + g, 0);
                  const groupTotal = records[0]?.total ?? numGuesses;
                  return (
                    <tr className="row-sep">
                      <th className="col-user">Collective Score</th>
                      {groupGuesses.map((g, i) => <GuessCell key={i} g={g} />)}
                      <td className="col-sep">{groupScore}/{groupTotal}</td>
                    </tr>
                  );
                })()}
              </tbody>
            </table>
          </div>
          {syncPair && (
            <p className="most-in-sync">🤝 Most in sync: <strong>{syncPair[0]}</strong> and <strong>{syncPair[1]}</strong></p>
          )}
          {(() => {
            const pulls = bestPull(records, dayAnswers);
            if (!pulls) return null;
            return (
              <p className="best-pull">
                {pulls.length > 1 ? '🤔🎣 Rarest pulls:' : '🤔🎣 Rarest pull:'}{' '}
                {pulls.map((pull, i) => (
                  <React.Fragment key={pull.article_name}>
                    {i > 0 ? ', ' : ''}
                    <span className={showAnswers ? '' : 'spoiler'} onClick={showAnswers ? undefined : () => setShowAnswers(true)}>
                      {showAnswers
                        ? <a href={pull.wikipedia_url} target="_blank">{pull.article_name}</a>
                        : pull.article_name}
                    </span>
                    {' '}({pull.players.map((p, j) => <React.Fragment key={p}>{j > 0 ? ', ' : ''}<strong>{p}</strong></React.Fragment>)})
                  </React.Fragment>
                ))}
              </p>
            );
          })()}
        </>
      );
    }

    // ── RollingAverageChart ───────────────────────────────────────────────────

    const PLAYER_COLORS = [
      '#e07b39', '#5b9bd5', '#70b870', '#c96fad',
      '#d4b84a', '#7b6fd4', '#5bbdb8',
    ];

    const PLAYER_SHAPES = [
      'circle', 'triangle', 'rect', 'star',
      'crossRot', 'rectRot', 'dash',
    ];

    function RollingAverageChart() {
      const canvasRef  = React.useRef(null);
      const chartRef   = React.useRef(null);
      const [numDays, setNumDays] = React.useState(23);

      React.useEffect(() => {
        fetch('leaderboard.json').then(r => r.json()).then(({ days, users, scores }) => {
          setNumDays(days.length);
          function rollingAvg(userScores, window = 7) {
            return days.map((d, i) => {
              const start = Math.max(0, i - window + 1);
              const vals  = days.slice(start, i + 1)
                .map(day => userScores[day])
                .filter(v => v !== null && v !== undefined);
              return vals.length > 0 ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
            });
          }

          const avgsByUser = users.map(user => rollingAvg(scores[user]));

          const datasets = users.map((user, i) => ({
            label:            user,
            data:             avgsByUser[i],
            borderColor:      PLAYER_COLORS[i % PLAYER_COLORS.length],
            backgroundColor:  PLAYER_COLORS[i % PLAYER_COLORS.length],
            tension:          0.35,
            pointStyle:       PLAYER_SHAPES[i % PLAYER_SHAPES.length],
            pointRadius:      4,
            pointHoverRadius: 6,
            borderWidth:      2,
            spanGaps:         true,
          }));

          if (chartRef.current) chartRef.current.destroy();

          chartRef.current = new Chart(canvasRef.current, {
            type: 'line',
            data: { labels: days.map(d => `#${d}`), datasets },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              interaction: { mode: 'index', intersect: false },
              plugins: {
                datalabels: false,
                legend: { position: 'bottom', labels: { usePointStyle: true, padding: 16 } },
                tooltip: {
                  callbacks: {
                    label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y !== null ? ctx.parsed.y.toFixed(2) : '—'}`,
                  },
                },
              },
              scales: {
                x: { ticks: { maxTicksLimit: 12, maxRotation: 0 } },
                y: { min: 2.5, max: 8.5, title: { display: true, text: '7-day rolling average score' } },
              },
            },
          });
        });

        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, []);

      return (
        <div className="chart-wrap">
          <div className="chart-inner" style={{ minWidth: `${Math.max(560, numDays * 32)}px` }}>
            <canvas ref={canvasRef}></canvas>
          </div>
        </div>
      );
    }

    // ── MoggingTable ─────────────────────────────────────────────────────────

    function MoggingTable({ onSelectDay }) {
      const [rows, setRows] = React.useState(null);

      React.useEffect(() => {
        fetch('mogging.csv').then(r => r.text()).then(text => {
          const [header, ...lines] = text.trim().split('\n');
          const keys = header.split(',');
          setRows(lines.map(line => {
            const vals = line.split(',');
            return Object.fromEntries(keys.map((k, i) => [k, vals[i]]));
          }));
        }).catch(() => setRows([]));
      }, []);

      if (!rows || rows.length === 0) return null;

      return (
        <div className="table-wrap">
          <table className="results-table mogging-table">
            <thead>
              <tr>
                <th>Day</th>
                <th>Player</th>
                <th>Score</th>
                <th>Rest Avg</th>
                <th>Margin</th>
              </tr>
            </thead>
            <tbody>
              {rows.map(r => (
                <tr key={r.day}>
                  <td>
                    <button className="day-select-btn" onClick={() => onSelectDay(Number(r.day))}>#{r.day}</button>
                  </td>
                  <td>{r.player}</td>
                  <td>{r.score}</td>
                  <td>{r.rest_avg}</td>
                  <td>{r.margin}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // ── CategoryCharts ────────────────────────────────────────────────────────

    function CategoryModal({ data, onClose }) {
      React.useEffect(() => {
        function onKey(e) { if (e.key === 'Escape') onClose(); }
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <span>{data.username} — {data.category}</span>
              <button className="modal-close" onClick={onClose}>✕</button>
            </div>
            <div className="modal-columns">
              <div>
                <h4 className="modal-col-heading">✅ correct ({data.correct.length})</h4>
                {data.correct.map(a => (
                  <div key={a.article_name + a.day} className="modal-article">
                    <a href={a.wikipedia_url} target="_blank">{a.article_name}</a>
                  </div>
                ))}
                {data.correct.length === 0 && <div className="modal-empty">none</div>}
              </div>
              <div>
                <h4 className="modal-col-heading">❌ missed ({data.incorrect.length})</h4>
                {data.incorrect.map(a => (
                  <div key={a.article_name + a.day} className="modal-article">
                    <a href={a.wikipedia_url} target="_blank">{a.article_name}</a>
                    {a.score === 0.5 && <span className="modal-partial"> (partial)</span>}
                  </div>
                ))}
                {data.incorrect.length === 0 && <div className="modal-empty">none</div>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function CategoryChart({ category, usersInCat, userColor, onBarClick }) {
      const canvasRef = React.useRef(null);
      const chartRef  = React.useRef(null);

      React.useEffect(() => {
        if (!canvasRef.current) return;
        if (chartRef.current) chartRef.current.destroy();

        const labels  = usersInCat.map(u => u.username);
        const values  = usersInCat.map(u => u.proportion);
        const colors  = usersInCat.map(u => userColor[u.username]);

        chartRef.current = new Chart(canvasRef.current, {
          type: 'bar',
          data: {
            labels,
            datasets: [{
              data:            values,
              backgroundColor: colors,
              borderColor:     colors,
              borderWidth:     1,
              borderRadius:    4,
            }],
          },
          options: {
            indexAxis: 'y',
            responsive:          true,
            maintainAspectRatio: false,
            onClick: (_, elements) => {
              if (elements.length > 0) onBarClick(usersInCat[elements[0].index]);
            },
            plugins: {
              legend:  { display: false },
              tooltip: {
                callbacks: {
                  label: ctx => {
                    const u = usersInCat[ctx.dataIndex];
                    return ` ${u.score} / ${u.attempts} answers`;
                  },
                },
              },
              datalabels: {
                anchor:    'end',
                align:     'end',
                formatter: v => Math.round(v * 100) + '%',
                font:      { size: 11, family: "'Comic Sans MS', 'Chalkboard SE', 'Comic Neue'" },
                color:     '#7a4a1e',
              },
            },
            scales: {
              x: {
                min: 0,
                max: 1,
                ticks: { callback: v => Math.round(v * 100) + '%', maxTicksLimit: 5 },
                grid: { color: '#f5cfa0' },
              },
              y: { grid: { display: false } },
            },
            layout: { padding: { right: 36 } },
          },
        });

        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, []);

      return (
        <div className="cat-chart-wrap">
          <h3 className="cat-chart-title">{category}</h3>
          <div style={{ height: `${usersInCat.length * 38 + 24}px`, position: 'relative' }}>
            <canvas ref={canvasRef}></canvas>
          </div>
        </div>
      );
    }

    function CategoryCharts() {
      const [stats,    setStats]    = React.useState(null);
      const [rawData,  setRawData]  = React.useState(null);
      const [answers,  setAnswers]  = React.useState(null);
      const [modal,    setModal]    = React.useState(null);

      React.useEffect(() => {
        Promise.all([
          fetch('category_stats.json').then(r => r.json()),
          fetch('data.json').then(r => r.json()),
          fetch('answers.json').then(r => r.json()),
        ]).then(([s, d, a]) => { setStats(s); setRawData(d); setAnswers(a); });
      }, []);

      if (!stats || !rawData || !answers) return null;

      const allUsers  = Object.keys(stats).sort();
      const userColor = Object.fromEntries(
        allUsers.map((u, i) => [u, PLAYER_COLORS[i % PLAYER_COLORS.length]])
      );
      const categories = [...new Set(Object.values(stats).flatMap(u => Object.keys(u)))].sort();

      function handleBarClick(category, { username }) {
        const correct = [], incorrect = [];
        for (const rec of rawData) {
          if (rec.username !== username) continue;
          const guesses  = typeof rec.guesses === 'string' ? JSON.parse(rec.guesses) : rec.guesses;
          const dayAnswers = answers[rec.day_number] ?? [];
          dayAnswers.forEach((ans, idx) => {
            if (ans.knowledge_area !== category) return;
            const score = guesses[idx] ?? null;
            if (score === null) return;
            const entry = { article_name: ans.article_name, wikipedia_url: ans.wikipedia_url, score, day: rec.day_number };
            (score === 1 ? correct : incorrect).push(entry);
          });
        }
        setModal({ username, category, correct, incorrect });
      }

      return (
        <>
          {modal && <CategoryModal data={modal} onClose={() => setModal(null)} />}
          <div className="cat-charts-grid">
            {categories.map(cat => {
              const usersInCat = allUsers
                .filter(u => stats[u][cat])
                .map(u => ({ username: u, ...stats[u][cat] }))
                .sort((a, b) => b.proportion - a.proportion);
              return (
                <CategoryChart
                  key={cat}
                  category={cat}
                  usersInCat={usersInCat}
                  userColor={userColor}
                  onBarClick={u => handleBarClick(cat, u)}
                />
              );
            })}
          </div>
        </>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────

    function App() {
      const [selectedDay, setSelectedDay] = React.useState(null);
      const perDayRef = React.useRef(null);

      React.useEffect(() => {
        if (selectedDay !== null && perDayRef.current) {
          perDayRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [selectedDay]);

      return (
        <>
          <h2>leaderboard</h2>
          <LeaderboardTable onSelectDay={setSelectedDay} />
          <h2 ref={perDayRef}>daily results</h2>
          <GuessBreakdown selectedDay={selectedDay} />
          <h2>biggest moggings</h2>
          <p className="small-text">
            Days where the top player outscored the mean of the rest of the
            players by the largest margin
          </p>
          <MoggingTable onSelectDay={setSelectedDay} />
          <h2>7-day rolling average leaderboard</h2>
          <RollingAverageChart />
          <h2>performance by category</h2>
          <CategoryCharts />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
